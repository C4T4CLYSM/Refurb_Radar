<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
<title>Refurb Radar — Find second-life tech near you</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<!-- Tailwind CSS (CDN) -->
<script src="https://cdn.tailwindcss.com"></script>
<!-- Cyberpunk fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          void: {
            950: '#000d1f',
            900: '#001228',
            800: '#001a38',
            700: '#00214e',  /* brand navy */
            600: '#002d6b',
          },
          accent: {
            blue:    '#1585cf',
            yellow:  '#fefd03',
            cyan:    '#7dffff',
            magenta: '#f653f8',
          }
        },
        fontFamily: {
          display: ['Orbitron', 'sans-serif'],
          mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
        }
      }
    }
  }
</script>

<style>
  html, body { height: 100%; }
  body { font-family: 'JetBrains Mono', ui-monospace, monospace; background: #000d1f; }
  #map { height: 100%; width: 100%; background: #000d1f; }

  .grid-fade {
    background-image:
      linear-gradient(rgba(21,133,207,0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(21,133,207,0.08) 1px, transparent 1px);
    background-size: 22px 22px;
  }

  .scanlines {
    position: fixed; inset: 0; pointer-events: none; z-index: 1500;
    background: repeating-linear-gradient(
      to bottom,
      rgba(125,255,255,0.018) 0px, rgba(125,255,255,0.018) 1px,
      transparent 1px, transparent 3px
    );
    mix-blend-mode: overlay;
  }

  /* Neon glow utilities */
  .glow-yellow  { text-shadow: 0 0 6px rgba(254,253,3,0.9),  0 0 18px rgba(254,253,3,0.45); }
  .glow-cyan    { text-shadow: 0 0 6px rgba(125,255,255,0.85), 0 0 16px rgba(125,255,255,0.4); }
  .glow-magenta { text-shadow: 0 0 6px rgba(246,83,248,0.85), 0 0 16px rgba(246,83,248,0.4); }

  .box-glow-cyan    { box-shadow: 0 0 0 1px rgba(125,255,255,0.45), 0 0 12px rgba(125,255,255,0.3), 0 0 28px rgba(125,255,255,0.1); }
  .box-glow-yellow  { box-shadow: 0 0 0 1px rgba(254,253,3,0.5),    0 0 12px rgba(254,253,3,0.3),   0 0 28px rgba(254,253,3,0.1); }
  .box-glow-magenta { box-shadow: 0 0 0 1px rgba(246,83,248,0.5),   0 0 14px rgba(246,83,248,0.35), 0 0 28px rgba(246,83,248,0.12); }

  /* Leaflet popup */
  .leaflet-popup-content-wrapper {
    background: #000d1f; border-radius: 10px; padding: 0; overflow: hidden;
    box-shadow: 0 0 0 1px rgba(125,255,255,0.4), 0 0 24px rgba(125,255,255,0.2), 0 8px 24px rgba(0,0,0,0.7);
  }
  .leaflet-popup-content { margin: 0; width: 275px !important; }
  .leaflet-popup-tip { background: #000d1f; box-shadow: 0 0 8px rgba(125,255,255,0.2); }
  .leaflet-popup-close-button {
    color: #7dffff !important; z-index: 10;
    font-size: 20px !important; padding: 6px 8px 0 0 !important;
    text-shadow: 0 0 6px rgba(125,255,255,0.8);
  }
  .leaflet-popup-close-button:hover { color: #f653f8 !important; }

  /* Leaflet zoom controls */
  .leaflet-control-zoom a {
    background: #001228 !important; color: #7dffff !important;
    border: 1px solid rgba(125,255,255,0.3) !important;
  }
  .leaflet-control-zoom a:hover { background: #001a38 !important; color: #fefd03 !important; }
  .leaflet-control-attribution {
    background: rgba(0,13,31,0.8) !important; color: #4b5563 !important;
  }
  .leaflet-control-attribution a { color: #1585cf !important; }

  /* Map pins */
  .custom-pin {
    background: #000d1f; width: 34px; height: 34px;
    border-radius: 50% 50% 50% 0; transform: rotate(-45deg);
    display: flex; align-items: center; justify-content: center;
    border: 2px solid #7dffff;
    box-shadow: 0 0 6px rgba(125,255,255,0.85), 0 0 20px rgba(125,255,255,0.45);
  }
  .custom-pin.closed {
    border-color: #f653f8;
    box-shadow: 0 0 6px rgba(246,83,248,0.8), 0 0 18px rgba(246,83,248,0.4);
    opacity: 0.85;
  }
  .custom-pin span { transform: rotate(45deg); font-size: 16px; }

  /* User location dot — yellow pulsing */
  .user-dot {
    width: 16px; height: 16px;
    background: #fefd03; border: 2px solid #000d1f; border-radius: 50%;
    box-shadow: 0 0 8px rgba(254,253,3,0.95), 0 0 20px rgba(254,253,3,0.6), 0 0 0 4px rgba(254,253,3,0.18);
    animation: pulse-yellow 2s infinite;
  }
  @keyframes pulse-yellow {
    0%, 100% { box-shadow: 0 0 8px rgba(254,253,3,0.95), 0 0 20px rgba(254,253,3,0.6), 0 0 0 4px rgba(254,253,3,0.18); }
    50%       { box-shadow: 0 0 12px rgba(254,253,3,1),   0 0 28px rgba(254,253,3,0.75), 0 0 0 7px rgba(254,253,3,0.1); }
  }

  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  ::selection { background: rgba(125,255,255,0.25); color: #fff; }
</style>
</head>

<body class="bg-void-950 text-gray-200">
<div class="scanlines"></div>

<div class="flex flex-col h-screen w-screen overflow-hidden">

  <!-- Header -->
  <header class="flex-none grid-fade bg-void-700 text-white px-4 py-3 border-b border-accent-blue/30 z-[1000] flex items-center justify-between">
    <div>
      <h1 class="font-display text-xl sm:text-2xl font-black tracking-wide flex items-center gap-2 text-accent-yellow glow-yellow">
        <span class="inline-block w-2.5 h-2.5 rounded-full bg-accent-magenta shadow-[0_0_8px_3px_rgba(246,83,248,0.8)] animate-pulse"></span>
        REFURB RADAR
      </h1>
      <p class="text-accent-blue text-xs sm:text-sm mt-0.5 font-mono">&gt; Find second-life tech in your neighborhood_</p>
    </div>
    <button id="locateBtn" title="Find my location"
      class="flex-none bg-void-800 hover:bg-void-600 border border-accent-cyan/50 text-accent-cyan transition rounded-full p-3 box-glow-cyan">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M12 2v4M12 18v4M2 12h4M18 12h4"></path>
      </svg>
    </button>
  </header>

  <!-- Search bar -->
  <div class="flex-none bg-void-950 px-4 py-2.5 border-b border-accent-blue/20 z-[999]">
    <div class="relative">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 absolute left-3 top-1/2 -translate-y-1/2 text-accent-cyan/60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"></circle>
        <path d="m21 21-4.35-4.35"></path>
      </svg>
      <input id="searchInput" type="text" placeholder="search_by_city_or_item('laptops')..."
        class="w-full pl-9 pr-9 py-2.5 rounded-full bg-void-800 border border-accent-blue/30 text-sm font-mono text-accent-cyan focus:outline-none focus:ring-2 focus:ring-accent-cyan focus:border-accent-cyan/60 placeholder-gray-600" />
      <button id="clearSearch" class="hidden absolute right-3 top-1/2 -translate-y-1/2 text-gray-600 hover:text-accent-magenta">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6 6 18M6 6l12 12"></path>
        </svg>
      </button>
    </div>
  </div>

  <!-- Map + bottom sheet -->
  <div class="relative flex-1 min-h-0">
    <div id="map"></div>

    <!-- Result count chip -->
    <div id="resultChip" class="absolute top-3 left-1/2 -translate-x-1/2 z-[998] bg-void-950/95 backdrop-blur border border-accent-cyan/40 px-3 py-1 rounded-full text-xs font-mono font-medium text-accent-cyan box-glow-cyan hidden">
      <span id="resultCount">0</span> centers found
    </div>

    <!-- Bottom sheet -->
    <div class="absolute bottom-0 left-0 right-0 z-[998] pointer-events-none">
      <div class="pointer-events-auto bg-void-950/97 backdrop-blur border-t border-accent-blue/30 rounded-t-2xl shadow-[0_-4px_28px_rgba(125,255,255,0.12)] max-h-[40vh] sm:max-h-[45vh] flex flex-col">
        <div class="flex-none flex justify-center py-2 cursor-pointer" id="sheetHandle">
          <div class="w-10 h-1.5 bg-accent-blue/50 rounded-full"></div>
        </div>
        <div id="centerList" class="overflow-y-auto no-scrollbar px-3 pb-3 space-y-2"></div>
      </div>
    </div>
  </div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  const recyclingCenters = [
    {
      id: 1,
      name: "Paymore",
      lat: 37.6548,
      lng: -122.4079,
      address: "951 El Camino Real, South San Francisco, CA 94080",
      inventory: "Buy, sell & trade phones, laptops & electronics",
      phone: null,
      website: "https://southsanfrancisco.paymore.com/",
      status: "Open"
    },
    {
      id: 2,
      name: "Love Haight Computers",
      lat: 37.7694,
      lng: -122.4438,
      address: "1324 Haight St, San Francisco, CA 94117",
      inventory: "Used & refurbished Macs, PCs, parts & repairs",
      phone: null,
      website: "https://www.lovehaightcomputers.com/",
      status: "Open"
    },
    {
      id: 3,
      name: "Tech Exchange",
      lat: 37.8345,
      lng: -122.2638,
      address: "1716 Telegraph Ave, Oakland, CA 94612",
      inventory: "Refurbished computers for nonprofits, schools & individuals",
      phone: "(510) 866-2260",
      website: "https://www.techexchange.org/",
      status: "Open"
    },
    {
      id: 4,
      name: "Renew Computers",
      lat: 37.9735,
      lng: -122.5310,
      address: "446 DuBois St, San Rafael, CA",
      inventory: "Remanufactured laptops, desktops & accessories",
      phone: "(415) 457-8801",
      website: "https://renewcomputers.com/",
      status: "Open"
    },
    {
      id: 5,
      name: "E-Waste Collective — Berkeley",
      lat: 37.8637,
      lng: -122.2860,
      address: "620 Page St, Berkeley, CA 94710",
      inventory: "E-waste recycling & refurbished electronics drop-off",
      phone: "(415) 883-1428",
      website: "https://ewastecollective.org/",
      status: "Open"
    },
    {
      id: 6,
      name: "E-Waste Collective — Novato",
      lat: 38.0856,
      lng: -122.5599,
      address: "42 Digital Drive #2, Novato, CA 94949",
      inventory: "E-waste recycling & refurbished electronics drop-off",
      phone: "(415) 883-1428",
      website: "https://ewastecollective.org/",
      status: "Open"
    },
    {
      id: 7,
      name: "MacBlowouts",
      lat: 37.2467,
      lng: -121.8130,
      address: "6104 Camino Verde Dr Suite 2, San Jose, CA 95119",
      inventory: "Refurbished Macs, Apple products & accessories",
      phone: "(408) 622-0005",
      website: "https://macblowouts.com/",
      status: "Open"
    },
    {
      id: 8,
      name: "DV Warehouse",
      lat: 34.0984,
      lng: -118.3279,
      address: "1515 Wilcox Ave, Los Angeles, CA 90028",
      inventory: "Used cameras, A/V gear, laptops & electronics",
      phone: "(323) 463-5005",
      website: "https://www.dvwarehouse.com/",
      status: "Open"
    },
    {
      id: 9,
      name: "MacPro LA",
      lat: 34.1044,
      lng: -118.3344,
      address: "1947 N Cahuenga Blvd Unit 104, Los Angeles, CA 90068",
      inventory: "Refurbished Macs, MacBook repairs & upgrades",
      phone: "(323) 378-5603",
      website: "https://macpro-la.com/",
      status: "Open"
    },
    {
      id: 10,
      name: "DC Computers",
      lat: 32.7524,
      lng: -117.1648,
      address: "1070 University Ave J101, San Diego, CA 92103",
      inventory: "Refurbished desktops, laptops, components & parts",
      phone: "(619) 255-4333",
      website: "https://dccomputerwarehouse.com/",
      status: "Open"
    },
    {
      id: 11,
      name: "Circular Systems",
      lat: 38.5673,
      lng: -121.4760,
      address: "1930 28th St, Sacramento, CA 95816",
      inventory: "Sustainable refurbished computers & electronics",
      phone: "(916) 455-6888",
      website: "https://www.circularcomputers.com/",
      status: "Open"
    },
    {
      id: 12,
      name: "Micro Center",
      lat: 37.3559,
      lng: -121.9856,
      address: "5201 Stevens Creek Blvd, Santa Clara, CA 95051",
      inventory: "New & open-box CPUs, GPUs, RAM, laptops & more",
      phone: null,
      website: "https://www.microcenter.com/",
      status: "Open"
    }
  ];

  // Map setup — default zoomed out to show all CA locations
  const DEFAULT_CENTER = [36.90, -120.10];
  const map = L.map('map', { zoomControl: false }).setView(DEFAULT_CENTER, 6);
  L.control.zoom({ position: 'bottomright' }).addTo(map);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 19, subdomains: 'abcd',
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>'
  }).addTo(map);

  function pinIcon(status) {
    return L.divIcon({
      className: '',
      html: `<div class="custom-pin ${status === 'Closed' ? 'closed' : ''}"><span>♻️</span></div>`,
      iconSize: [34, 34], iconAnchor: [17, 30], popupAnchor: [0, -28]
    });
  }

  function popupHtml(center) {
    const statusBadge = center.status === 'Open'
      ? `<span style="display:inline-block;background:rgba(125,255,255,0.12);color:#7dffff;border:1px solid rgba(125,255,255,0.4);font-size:10px;font-weight:700;letter-spacing:.1em;padding:2px 8px;border-radius:999px;">● OPEN</span>`
      : `<span style="display:inline-block;background:rgba(246,83,248,0.12);color:#f653f8;border:1px solid rgba(246,83,248,0.4);font-size:10px;font-weight:700;letter-spacing:.1em;padding:2px 8px;border-radius:999px;">● CLOSED</span>`;

    const directionsUrl = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(center.address)}`;

    const phoneHtml = center.phone
      ? `<a href="tel:${center.phone.replace(/[^\d+]/g, '')}" style="display:block;color:#7dffff;text-decoration:none;" onmouseover="this.style.color='#fefd03'" onmouseout="this.style.color='#7dffff'">☎ ${center.phone}</a>`
      : '';

    return `
      <div style="font-family:'JetBrains Mono',monospace;">
        <div style="background:#00214e;border-bottom:1px solid rgba(125,255,255,0.25);padding:12px 16px;">
          <h3 style="font-family:'Orbitron',sans-serif;font-weight:700;font-size:13px;color:#fefd03;text-shadow:0 0 6px rgba(254,253,3,0.8),0 0 16px rgba(254,253,3,0.35);margin:0 24px 6px 0;line-height:1.3;">${center.name}</h3>
          ${statusBadge}
        </div>
        <div style="padding:12px 16px;font-size:12px;color:#9ca3af;display:flex;flex-direction:column;gap:10px;">
          <p style="margin:0;color:#6b7280;display:flex;gap:6px;">
            <span style="color:#1585cf;">&gt;</span><span>${center.address}</span>
          </p>
          <div>
            <p style="margin:0 0 3px;color:#f653f8;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;">// About</p>
            <p style="margin:0;color:#d1d5db;line-height:1.5;">${center.inventory}</p>
          </div>
          <div style="display:flex;flex-direction:column;gap:4px;">
            ${phoneHtml}
            <a href="${center.website}" target="_blank" rel="noopener" style="color:#7dffff;text-decoration:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" onmouseover="this.style.color='#fefd03'" onmouseout="this.style.color='#7dffff'">⚡ visit_site</a>
          </div>
          <a href="${directionsUrl}" target="_blank" rel="noopener"
            style="display:block;text-align:center;background:#f653f8;color:#fff;font-family:'Orbitron',sans-serif;font-weight:700;font-size:11px;letter-spacing:.15em;text-transform:uppercase;padding:10px;border-radius:999px;text-decoration:none;box-shadow:0 0 12px rgba(246,83,248,0.65),0 0 28px rgba(246,83,248,0.3);"
            onmouseover="this.style.boxShadow='0 0 18px rgba(246,83,248,0.9),0 0 36px rgba(246,83,248,0.5)'"
            onmouseout="this.style.boxShadow='0 0 12px rgba(246,83,248,0.65),0 0 28px rgba(246,83,248,0.3)'">
            Get Directions
          </a>
        </div>
      </div>
    `;
  }

  const markers = {};
  recyclingCenters.forEach(center => {
    const marker = L.marker([center.lat, center.lng], { icon: pinIcon(center.status) })
      .addTo(map)
      .bindPopup(popupHtml(center));
    markers[center.id] = marker;
  });

  // Geolocation
  let userMarker = null;

  function locateUser(showAlertOnError) {
    if (!navigator.geolocation) {
      if (showAlertOnError) alert('Geolocation is not supported by your browser.');
      return;
    }
    navigator.geolocation.getCurrentPosition(
      ({ coords: { latitude, longitude } }) => {
        map.setView([latitude, longitude], 12);
        if (userMarker) {
          userMarker.setLatLng([latitude, longitude]);
        } else {
          userMarker = L.marker([latitude, longitude], {
            icon: L.divIcon({ className: '', html: '<div class="user-dot"></div>', iconSize: [16, 16], iconAnchor: [8, 8] }),
            zIndexOffset: 1000
          }).addTo(map).bindPopup('You are here');
        }
      },
      (err) => { if (showAlertOnError) alert('Could not get your location: ' + err.message); },
      { enableHighAccuracy: true, timeout: 8000 }
    );
  }

  locateUser(false);
  document.getElementById('locateBtn').addEventListener('click', () => locateUser(true));

  // List + search/filter
  const listEl       = document.getElementById('centerList');
  const searchInput  = document.getElementById('searchInput');
  const clearBtn     = document.getElementById('clearSearch');
  const resultChip   = document.getElementById('resultChip');
  const resultCount  = document.getElementById('resultCount');

  function renderList(items) {
    listEl.innerHTML = '';
    if (items.length === 0) {
      listEl.innerHTML = `<p class="text-center text-gray-600 text-sm font-mono py-6">// no centers match your query_</p>`;
      return;
    }
    items.forEach(center => {
      const card = document.createElement('button');
      card.className = 'w-full text-left bg-void-900 hover:bg-void-800 rounded-xl px-3.5 py-3 flex items-center gap-3 transition border border-accent-blue/15 hover:border-accent-cyan/45';
      card.innerHTML = `
        <div class="flex-none w-10 h-10 rounded-full bg-void-950 border border-accent-cyan/40 flex items-center justify-center text-lg" style="box-shadow:0 0 8px rgba(125,255,255,0.3)">♻️</div>
        <div class="min-w-0 flex-1">
          <div class="flex items-center gap-2">
            <p class="font-display font-bold text-sm text-gray-100 truncate">${center.name}</p>
            ${center.status === 'Open'
              ? '<span class="flex-none text-[10px] font-mono font-bold text-accent-cyan bg-accent-cyan/10 border border-accent-cyan/30 px-1.5 py-0.5 rounded-full">OPEN</span>'
              : '<span class="flex-none text-[10px] font-mono font-bold text-accent-magenta bg-accent-magenta/10 border border-accent-magenta/30 px-1.5 py-0.5 rounded-full">CLOSED</span>'}
          </div>
          <p class="text-xs text-gray-500 font-mono truncate">${center.address}</p>
          <p class="text-xs text-accent-blue font-mono truncate mt-0.5">${center.inventory}</p>
        </div>
      `;
      card.addEventListener('click', () => {
        map.setView([center.lat, center.lng], 14, { animate: true });
        markers[center.id].openPopup();
      });
      listEl.appendChild(card);
    });
  }

  function applyFilter() {
    const q = searchInput.value.trim().toLowerCase();
    clearBtn.classList.toggle('hidden', q.length === 0);
    const filtered = q.length === 0
      ? recyclingCenters
      : recyclingCenters.filter(c =>
          c.name.toLowerCase().includes(q) ||
          c.address.toLowerCase().includes(q) ||
          c.inventory.toLowerCase().includes(q)
        );
    renderList(filtered);
    recyclingCenters.forEach(c => {
      const show = filtered.includes(c);
      const m = markers[c.id];
      if (show && !map.hasLayer(m)) m.addTo(map);
      if (!show && map.hasLayer(m)) map.removeLayer(m);
    });
    if (q.length > 0) {
      resultChip.classList.remove('hidden');
      resultCount.textContent = filtered.length;
    } else {
      resultChip.classList.add('hidden');
    }
  }

  searchInput.addEventListener('input', applyFilter);
  clearBtn.addEventListener('click', () => { searchInput.value = ''; applyFilter(); searchInput.focus(); });
  renderList(recyclingCenters);

  // Bottom sheet collapse toggle
  const sheetHandle = document.getElementById('sheetHandle');
  const sheet = sheetHandle.parentElement;
  let collapsed = false;
  sheetHandle.addEventListener('click', () => {
    collapsed = !collapsed;
    sheet.style.transform = collapsed ? 'translateY(calc(100% - 28px))' : 'translateY(0)';
    sheet.style.transition = 'transform 0.25s ease';
  });
</script>

</body>
</html>
