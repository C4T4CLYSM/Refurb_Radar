<style>
  html, body { height: 100%; }
  body { font-family: 'JetBrains Mono', ui-monospace, monospace; background: #000d1f; }

  .scanlines {
    position: fixed; inset: 0; pointer-events: none; z-index: 1500;
    background: repeating-linear-gradient(

    );

  /* Neon glow utilities */

  .glow-cyan    { text-shadow: 0 0 6px rgba(125,255,255,0.85), 0 0 16px rgba(125,255,255,0.4); }
  .glow-magenta { text-shadow: 0 0 6px rgba(246,83,248,0.85), 0 0 16px rgba(246,83,248,0.4); }

  .box-glow-cyan    { box-shadow: 0 0 0 1px rgba(125,255,255,0.45), 0 0 12px rgba(125,255,255,0.3), 0 0 28px rgba(125,255,255,0.1); }
  .box-glow-yellow  { box-shadow: 0 0 0 1px rgba(254,253,3,0.5),    0 0 12px rgba(254,253,3,0.3),   0 0 28px rgba(254,253,3,0.1); }
  .box-glow-magenta { box-shadow: 0 0 0 1px rgba(246,83,248,0.5),   0 0 14px rgba(246,83,248,0.35), 0 0 28px rgba(246,83,248,0.12); }

  /* Leaflet popup */
  .leaflet-popup-content-wrapper {
    background: #000d1f; border-radius: 10px; padding: 0; overflow: hidden;
    box-shadow: 0 0 0 1px rgba(125,255,255,0.4), 0 0 24px rgba(125,255,255,0.2), 0 8px 24px rgba(0,0,0,0.7);
  }
  .leaflet-popup-content { margin: 0; width: 275px !important; }
  .leaflet-popup-tip { background: #000d1f; box-shadow: 0 0 8px rgba(125,255,255,0.2); }
  .leaflet-popup-close-button {
    color: #7dffff !important; z-index: 10;
    font-size: 20px !important; padding: 6px 8px 0 0 !important;
    text-shadow: 0 0 6px rgba(125,255,255,0.8);
  }
  .leaflet-popup-close-button:hover { color: #f653f8 !important; }

  /* Leaflet zoom controls */
  .leaflet-control-zoom a {
    background: #001228 !important; color: #7dffff !important;
    border: 1px solid rgba(125,255,255,0.3) !important;
  }
  .leaflet-control-zoom a:hover { background: #001a38 !important; color: #fefd03 !important; }
  .leaflet-control-attribution {
    background: rgba(0,13,31,0.8) !important; color: #4b5563 !important;
  }
  .leaflet-control-attribution a { color: #1585cf !important; }

  /* Map pins */
  .custom-pin {
    background: #000d1f; width: 34px; height: 34px;
    border-radius: 50% 50% 50% 0; transform: rotate(-45deg);
    display: flex; align-items: center; justify-content: center;
    border: 2px solid #7dffff;
    box-shadow: 0 0 6px rgba(125,255,255,0.85), 0 0 20px rgba(125,255,255,0.45);
  }
  .custom-pin.closed {
    border-color: #f653f8;
    box-shadow: 0 0 6px rgba(246,83,248,0.8), 0 0 18px rgba(246,83,248,0.4);
    opacity: 0.85;
  }
  .custom-pin span { transform: rotate(45deg); font-size: 16px; }

  /* User location dot — yellow pulsing */
  .user-dot {
    width: 16px; height: 16px;
    background: #fefd03; border: 2px solid #000d1f; border-radius: 50%;
    box-shadow: 0 0 8px rgba(254,253,3,0.95), 0 0 20px rgba(254,253,3,0.6), 0 0 0 4px rgba(254,253,3,0.18);
    animation: pulse-yellow 2s infinite;
  }
  @keyframes pulse-yellow {
    0%, 100% { box-shadow: 0 0 8px rgba(254,253,3,0.95), 0 0 20px rgba(254,253,3,0.6), 0 0 0 4px rgba(254,253,3,0.18); }
    50%       { box-shadow: 0 0 12px rgba(254,253,3,1),   0 0 28px rgba(254,253,3,0.75), 0 0 0 7px rgba(254,253,3,0.1); }
  }

  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  ::selection { background: rgba(125,255,255,0.25); color: #fff; }

  /* ── Glitch title ── */
  .glitch { position: relative; }
  .glitch::before, .glitch::after {
    content: attr(data-text);
    position: absolute; inset: 0;
    font-family: inherit; font-weight: inherit; font-size: inherit;
    letter-spacing: inherit; line-height: inherit; white-space: nowrap;
    pointer-events: none;
  }
  .glitch::before { color: #f653f8; animation: glitch-slice-a 9s -0.5s infinite; }
  .glitch::after  { color: #7dffff; animation: glitch-slice-b 9s -0.5s infinite; }
  .glitch { animation: glitch-shake 9s -0.5s infinite; }

  @keyframes glitch-shake {
    0%,4%,88%,100% { transform: none; }
    1% { transform: translateX(-4px) skewX(-3deg); }
    2% { transform: translateX(4px) skewX(1deg); }
    3% { transform: translateX(-2px); }
    89% { transform: translateX(-3px) skewX(-2deg); }
    90% { transform: translateX(3px); }
    91% { transform: none; }
  }
  @keyframes glitch-slice-a {
    0%,86%,100% { opacity:0; clip-path:none; transform:none; }
    87% { opacity:1; clip-path:polygon(0 5%,100% 5%,100% 32%,0 32%); transform:translateX(-6px); }
    88% { clip-path:polygon(0 55%,100% 55%,100% 78%,0 78%); transform:translateX(5px); }
    89% { opacity:0; }
    92% { opacity:.7; clip-path:polygon(0 18%,100% 18%,100% 44%,0 44%); transform:translateX(-3px); }
    94% { opacity:0; }
  }
  @keyframes glitch-slice-b {
    0%,87%,100% { opacity:0; clip-path:none; transform:none; }
    88% { opacity:1; clip-path:polygon(0 38%,100% 38%,100% 62%,0 62%); transform:translateX(6px); }
    89% { clip-path:polygon(0 68%,100% 68%,100% 90%,0 90%); transform:translateX(-5px); }
    90% { opacity:0; }
    93% { opacity:.6; clip-path:polygon(0 8%,100% 8%,100% 33%,0 33%); transform:translateX(4px); }
    95% { opacity:0; }
  }

  /* ── Blinking cursor ── */
  .blink-cursor { animation: blink-cur 1s step-end infinite; color: #fefd03; }
  @keyframes blink-cur { 0%,100%{opacity:1} 50%{opacity:0} }

  /* ── Scanning progress bar ── */
  #scanProgress { transition: width 1.4s cubic-bezier(.4,0,.2,1); box-shadow: 0 0 8px rgba(125,255,255,0.7); }

  /* ── Stats bar ── */
  #statsBar { font-size: 10px; letter-spacing: .04em; }

  /* ── HUD popup — sharp corners, data-dense ── */
  .leaflet-popup-content-wrapper {
    background: #000d1f !important; border-radius: 0 !important; padding: 0 !important;
    overflow: hidden !important;
    border: 1px solid rgba(125,255,255,0.5) !important;
    box-shadow: 0 0 0 1px rgba(125,255,255,0.15), 0 0 20px rgba(125,255,255,0.25), 0 8px 32px rgba(0,0,0,0.8) !important;
  }
  .leaflet-popup-tip-container { display: none !important; }
  .leaflet-popup-close-button {
    color: #fefd03 !important; z-index: 10;
    font-size: 18px !important; padding: 5px 7px 0 0 !important;
    text-shadow: 0 0 6px rgba(254,253,3,0.8) !important;
  }
  .leaflet-popup-close-button:hover { color: #f653f8 !important; }
  .leaflet-popup-content { margin: 0 !important; width: 285px !important; }

  /* HUD corner brackets */
  .hud-popup { position: relative; }
  .hud-corner { position: absolute; width: 10px; height: 10px; }
  .hud-corner.tl { top:-1px; left:-1px; border-top:2px solid #fefd03; border-left:2px solid #fefd03; }
  .hud-corner.tr { top:-1px; right:-1px; border-top:2px solid #fefd03; border-right:2px solid #fefd03; }
  .hud-corner.bl { bottom:-1px; left:-1px; border-bottom:2px solid #7dffff; border-left:2px solid #7dffff; }
  .hud-corner.br { bottom:-1px; right:-1px; border-bottom:2px solid #7dffff; border-right:2px solid #7dffff; }

  /* Result chip sharp */
  #resultChip { border-radius: 0 !important; }
</style>

  const DEFAULT_CENTER = [39.50, -98.35];
  const map = L.map('map', { zoomControl: false }).setView(DEFAULT_CENTER, 4);
  L.control.zoom({ position: 'bottomright' }).addTo(map);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 19, subdomains: 'abcd',
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>'
  }).addTo(map);

  function pinIcon(status) {
    return L.divIcon({
      className: '',
      html: `<div class="custom-pin ${status === 'Closed' ? 'closed' : ''}"><span>♻️</span></div>`,
      iconSize: [34, 34], iconAnchor: [17, 30], popupAnchor: [0, -28]
    });
  }

  function popupHtml(center) {
    const isOpen   = center.status === 'Open';
    const sysColor = isOpen ? '#7dffff' : '#f653f8';
    const sysLabel = isOpen ? '● SYS:ONLINE' : '● SYS:OFFLINE';
    const nodeId   = String(center.id).padStart(3, '0');
    const latStr   = `${Math.abs(center.lat).toFixed(4)}° ${center.lat >= 0 ? 'N' : 'S'}`;
    const lngStr   = `${Math.abs(center.lng).toFixed(4)}° ${center.lng >= 0 ? 'E' : 'W'}`;
    const directionsUrl = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(center.address)}`;

    const phoneRow = center.phone
      ? `<tr><td style="color:#1585cf;padding-right:8px;white-space:nowrap;vertical-align:top;">COM</td>
           <td><a href="tel:${center.phone.replace(/[^\d+]/g, '')}" style="color:#7dffff;text-decoration:none;" onmouseover="this.style.color='#fefd03'" onmouseout="this.style.color='#7dffff'">${center.phone}</a></td></tr>`
      : '';

    return `
      <div class="hud-popup" style="font-family:'JetBrains Mono',monospace;position:relative;">
        <div class="hud-corner tl"></div>
        <div class="hud-corner tr"></div>
        <div class="hud-corner bl"></div>
        <div class="hud-corner br"></div>

        <!-- Header -->
        <div style="background:#00214e;border-bottom:1px solid rgba(125,255,255,0.2);padding:10px 14px 9px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;">
            <span style="font-size:9px;color:#4b5563;letter-spacing:.1em;">NODE_ID: ${nodeId}</span>
            <span style="font-size:9px;font-weight:700;letter-spacing:.1em;color:${sysColor};text-shadow:0 0 6px ${sysColor}80;">${sysLabel}</span>
          </div>
          <h3 style="font-family:'Orbitron',sans-serif;font-weight:700;font-size:12px;color:#fefd03;text-shadow:0 0 6px rgba(254,253,3,0.8);margin:0;line-height:1.3;letter-spacing:.04em;">${center.name}</h3>
        </div>

        <!-- Data grid -->
        <div style="padding:10px 14px 4px;background:#000d1f;">
          <table style="width:100%;border-collapse:collapse;font-size:11px;line-height:1.6;">
            <tr><td style="color:#1585cf;padding-right:8px;white-space:nowrap;vertical-align:top;font-size:9px;letter-spacing:.06em;padding-top:1px;">ADDR</td>
                <td style="color:#9ca3af;">${center.address}</td></tr>
            <tr><td style="color:#1585cf;padding-right:8px;white-space:nowrap;vertical-align:top;font-size:9px;letter-spacing:.06em;padding-top:1px;">COORD</td>
                <td style="color:#fefd03;font-size:10px;letter-spacing:.04em;">${latStr} &nbsp;${lngStr}</td></tr>
            <tr><td style="color:#1585cf;padding-right:8px;white-space:nowrap;vertical-align:top;font-size:9px;letter-spacing:.06em;padding-top:1px;">TYPE</td>
                <td style="color:#d1d5db;">${center.inventory}</td></tr>
            ${phoneRow}
            <tr><td style="color:#1585cf;padding-right:8px;white-space:nowrap;vertical-align:top;font-size:9px;letter-spacing:.06em;padding-top:1px;">NET</td>
                <td><a href="${center.website}" target="_blank" rel="noopener" style="color:#7dffff;text-decoration:none;" onmouseover="this.style.color='#fefd03'" onmouseout="this.style.color='#7dffff'">visit_site ↗</a></td></tr>
          </table>
        </div>

        <!-- Divider -->
        <div style="margin:0 14px;border-top:1px solid rgba(125,255,255,0.12);"></div>

        <!-- CTA -->
        <div style="padding:10px 14px;">
          <a href="${directionsUrl}" target="_blank" rel="noopener"
            style="display:block;text-align:center;background:#f653f8;color:#fff;font-family:'Orbitron',sans-serif;font-weight:700;font-size:11px;letter-spacing:.2em;text-transform:uppercase;padding:9px;border-radius:0;text-decoration:none;box-shadow:0 0 12px rgba(246,83,248,0.6),0 0 28px rgba(246,83,248,0.25);"
            onmouseover="this.style.boxShadow='0 0 18px rgba(246,83,248,0.9),0 0 36px rgba(246,83,248,0.5)'"
            onmouseout="this.style.boxShadow='0 0 12px rgba(246,83,248,0.6),0 0 28px rgba(246,83,248,0.25)'">
            ▶ GET DIRECTIONS
          </a>
        </div>
      </div>
    `;
  }

  const markers = {};
  recyclingCenters.forEach(center => {
    const marker = L.marker([center.lat, center.lng], { icon: pinIcon(center.status) })
      .addTo(map)
      .bindPopup(popupHtml(center));
    markers[center.id] = marker;
  });

  // Geolocation
  let userMarker = null;

  function locateUser(showAlertOnError) {
    if (!navigator.geolocation) {
      if (showAlertOnError) alert('Geolocation is not supported by your browser.');
      return;
    }
    navigator.geolocation.getCurrentPosition(
      ({ coords: { latitude, longitude } }) => {
        map.setView([latitude, longitude], 12);
        if (userMarker) {
          userMarker.setLatLng([latitude, longitude]);
        } else {
          userMarker = L.marker([latitude, longitude], {
            icon: L.divIcon({ className: '', html: '<div class="user-dot"></div>', iconSize: [16, 16], iconAnchor: [8, 8] }),
            zIndexOffset: 1000
          }).addTo(map).bindPopup('You are here');
        }
      },
      (err) => { if (showAlertOnError) alert('Could not get your location: ' + err.message); },
      { enableHighAccuracy: true, timeout: 8000 }
    );
  }

  locateUser(false);
  document.getElementById('locateBtn').addEventListener('click', () => locateUser(true));

  // List + search/filter
  const listEl       = document.getElementById('centerList');
  const searchInput  = document.getElementById('searchInput');
  const clearBtn     = document.getElementById('clearSearch');
  const resultChip   = document.getElementById('resultChip');
  const resultCount  = document.getElementById('resultCount');

  function renderList(items) {
    listEl.innerHTML = '';
    if (items.length === 0) {
      listEl.innerHTML = `<p class="text-center text-gray-600 text-sm font-mono py-6">// no centers match your query_</p>`;
      return;
    }
    items.forEach(center => {
      const card = document.createElement('button');
      card.className = 'w-full text-left bg-void-900 hover:bg-void-800 rounded-xl px-3.5 py-3 flex items-center gap-3 transition border border-accent-blue/15 hover:border-accent-cyan/45';
      card.innerHTML = `
        <div class="flex-none w-10 h-10 rounded-full bg-void-950 border border-accent-cyan/40 flex items-center justify-center text-lg" style="box-shadow:0 0 8px rgba(125,255,255,0.3)">♻️</div>
        <div class="min-w-0 flex-1">
          <div class="flex items-center gap-2">
            <p class="font-display font-bold text-sm text-gray-100 truncate">${center.name}</p>
            ${center.status === 'Open'
              ? '<span class="flex-none text-[10px] font-mono font-bold text-accent-cyan bg-accent-cyan/10 border border-accent-cyan/30 px-1.5 py-0.5 rounded-full">OPEN</span>'
              : '<span class="flex-none text-[10px] font-mono font-bold text-accent-magenta bg-accent-magenta/10 border border-accent-magenta/30 px-1.5 py-0.5 rounded-full">CLOSED</span>'}
          </div>
          <p class="text-xs text-gray-500 font-mono truncate">${center.address}</p>
          <p class="text-xs text-accent-blue font-mono truncate mt-0.5">${center.inventory}</p>
        </div>
      `;
      card.addEventListener('click', () => {
        map.setView([center.lat, center.lng], 14, { animate: true });
        markers[center.id].openPopup();
      });
      listEl.appendChild(card);
    });
  }

  function applyFilter() {
    const q = searchInput.value.trim().toLowerCase();
    clearBtn.classList.toggle('hidden', q.length === 0);
    const filtered = q.length === 0
      ? recyclingCenters
      : recyclingCenters.filter(c =>
          c.name.toLowerCase().includes(q) ||
          c.address.toLowerCase().includes(q) ||
          c.inventory.toLowerCase().includes(q)
        );
    renderList(filtered);
    recyclingCenters.forEach(c => {
      const show = filtered.includes(c);
      const m = markers[c.id];
      if (show && !map.hasLayer(m)) m.addTo(map);
      if (!show && map.hasLayer(m)) map.removeLayer(m);
    });
    if (q.length > 0) {
      resultChip.classList.remove('hidden');
      resultCount.textContent = filtered.length;
    } else {
      resultChip.classList.add('hidden');
    }
  }

  searchInput.addEventListener('input', applyFilter);
  clearBtn.addEventListener('click', () => { searchInput.value = ''; applyFilter(); searchInput.focus(); });

  // ── Stats bar ──
  function updateStats(activeCount) {
    const now = new Date();
    const t = now.toTimeString().slice(0, 8);
    document.getElementById('statNodes').textContent  = activeCount;
    document.getElementById('statUnits').textContent  = recyclingCenters.length;
    document.getElementById('statTime').textContent   = t;
  }

  // ── Scanning animation → then render list ──
  function showScanning() {
    listEl.innerHTML = `
      <div style="padding:16px 4px;display:flex;flex-direction:column;gap:10px;">
        <p style="text-align:center;font-size:11px;color:#7dffff;letter-spacing:.12em;animation:blink-cur 1s step-end infinite;">// SCANNING FOR NODES...</p>
        <div style="background:#001228;height:3px;position:relative;overflow:hidden;">
          <div id="scanProgress" style="position:absolute;top:0;left:0;height:100%;width:0%;background:linear-gradient(90deg,#7dffff,#f653f8);"></div>
        </div>
        <p style="text-align:center;font-size:9px;color:#374151;letter-spacing:.1em;">INITIALIZING DATABASE...</p>
      </div>`;
    setTimeout(() => {
      const bar = document.getElementById('scanProgress');
      if (bar) bar.style.width = '100%';
    }, 60);
  }

  showScanning();
  setTimeout(() => {
    renderList(recyclingCenters);
    updateStats(recyclingCenters.length);
  }, 1600);

  // Update stats on every filter change
  const _origApply = applyFilter;
  searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim().toLowerCase();
    const count = q.length === 0 ? recyclingCenters.length
      : recyclingCenters.filter(c =>
          c.name.toLowerCase().includes(q) ||
          c.address.toLowerCase().includes(q) ||
          c.inventory.toLowerCase().includes(q)
        ).length;
    updateStats(count);
  });

  // ── Terminal typing animation ──
  (function typeTagline() {
    const el   = document.getElementById('typed-text');
    const text = 'Ghost the big box stores. Find local refurb computers and components';
    let i = 0;
    function tick() {
      el.textContent = text.slice(0, i);
      if (i < text.length) { i++; setTimeout(tick, i === 1 ? 600 : 38); }
    }
    setTimeout(tick, 400);
  })();

  // ── Bottom sheet collapse toggle ──
  const sheetHandle = document.getElementById('sheetHandle');
  const sheet = sheetHandle.parentElement;
  let collapsed = false;
  sheetHandle.addEventListener('click', () => {
    collapsed = !collapsed;
    sheet.style.transform = collapsed ? 'translateY(calc(100% - 28px))' : 'translateY(0)';
    sheet.style.transition = 'transform 0.25s ease';
  });
</script>

</body>
</html>
